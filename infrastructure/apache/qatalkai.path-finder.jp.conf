<VirtualHost *:80>
    ServerName qatalkai.path-finder.jp
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName qatalkai.path-finder.jp

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/path-finder.jp/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/path-finder.jp/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3028/
    ProxyPassReverse / http://127.0.0.1:3028/

    ErrorLog /var/log/httpd/qatalkai-error.log
    CustomLog /var/log/httpd/qatalkai-access.log combined
</VirtualHost>
